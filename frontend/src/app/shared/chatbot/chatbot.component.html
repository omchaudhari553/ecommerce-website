<div class="chatbot-container">
  <!-- Chat Button -->
  <button class="chatbot-button" (click)="toggleChat()" [class.active]="isOpen">
    <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
    <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <!-- Chat Window -->
  <div class="chatbot-window" [class.open]="isOpen">
    <div class="chatbot-header">
      <h3>Shopping Assistant</h3>
      <button class="close-button" (click)="toggleChat()">×</button>
    </div>

    <div class="chatbot-messages">
      <div *ngFor="let message of messages" class="message" [class.user]="message.sender === 'user'" [class.bot]="message.sender === 'bot'">
        <div class="message-content">{{ message.text }}</div>
      </div>
      <div *ngIf="isLoading" class="message bot">
        <div class="message-content typing">...</div>
      </div>
    </div>

    <div class="chatbot-input">
      <textarea 
        [(ngModel)]="currentMessage" 
        (keydown)="handleKeyPress($event)"
        placeholder="Type your message..."
        rows="1"
        [disabled]="isLoading">
      </textarea>
      <button (click)="sendMessage()" [disabled]="!currentMessage.trim() || isLoading">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>
