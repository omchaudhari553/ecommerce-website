<div class="product-list">
  <div class="header">
    <h2>Products</h2>
    <a routerLink="new" class="add-button">
      <i class="fas fa-plus"></i> Add New Product
    </a>
  </div>

  <div class="filters">
    <div class="search-box">
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (input)="onSearch()"
        placeholder="Search products...">
      <i class="fas fa-search"></i>
    </div>

    <div class="category-filter">
      <select [(ngModel)]="selectedCategory" (change)="onCategoryChange()">
        <option value="">All Categories</option>
        <option *ngFor="let category of categories" [value]="category">
          {{category}}
        </option>
      </select>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

  <div class="loading" *ngIf="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading products...
  </div>

  <div class="products-table" *ngIf="!loading">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Brand</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of filteredProducts">
          <td>
            <img [src]="product.image" [alt]="product.name">
          </td>
          <td>{{ product.name }}</td>
          <td>{{ product.brand }}</td>
          <td>{{ product.category }}</td>
          <td>₹{{ product.price }}</td>
          <td>{{ product.stockQuantity }}</td>
          <td class="actions">
            <a [routerLink]="[product.id, 'edit']" class="edit">
              <i class="fas fa-edit"></i>
            </a>
            <button (click)="deleteProduct(product.id!)" class="delete">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="no-products" *ngIf="filteredProducts.length === 0">
      <i class="fas fa-box-open"></i>
      <p>No products found</p>
    </div>
  </div>
</div>
