<div class="product-form">
  <div class="header">
    <h2>{{ isEditing ? 'Edit' : 'Add' }} Product</h2>
    <button class="back-button" routerLink="/admin/products">
      <i class="fas fa-arrow-left"></i> Back to Products
    </button>
  </div>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

  <form (ngSubmit)="onSubmit()" #productForm="ngForm">
    <div class="form-grid">
      <div class="form-group">
        <label for="name">Product Name*</label>
        <input 
          type="text" 
          id="name"
          name="name"
          [(ngModel)]="product.name"
          required
          #name="ngModel">
        <div class="error" *ngIf="name.invalid && (name.dirty || name.touched)">
          Product name is required
        </div>
      </div>

      <div class="form-group">
        <label for="brand">Brand*</label>
        <input 
          type="text" 
          id="brand"
          name="brand"
          [(ngModel)]="product.brand"
          required
          #brand="ngModel">
        <div class="error" *ngIf="brand.invalid && (brand.dirty || brand.touched)">
          Brand is required
        </div>
      </div>

      <div class="form-group">
        <label for="category">Category*</label>
        <select 
          id="category"
          name="category"
          [(ngModel)]="product.category"
          required
          #category="ngModel">
          <option value="">Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <div class="error" *ngIf="category.invalid && (category.dirty || category.touched)">
          Category is required
        </div>
      </div>

      <div class="form-group">
        <label for="price">Price*</label>
        <input 
          type="number" 
          id="price"
          name="price"
          [(ngModel)]="product.price"
          required
          min="0"
          step="0.01"
          #price="ngModel">
        <div class="error" *ngIf="price.invalid && (price.dirty || price.touched)">
          Valid price is required
        </div>
      </div>

      <div class="form-group">
        <label for="stockQuantity">Stock Quantity*</label>
        <input 
          type="number" 
          id="stockQuantity"
          name="stockQuantity"
          [(ngModel)]="product.stockQuantity"
          required
          min="0"
          #stockQuantity="ngModel">
        <div class="error" *ngIf="stockQuantity.invalid && (stockQuantity.dirty || stockQuantity.touched)">
          Valid stock quantity is required
        </div>
      </div>

      <div class="form-group full-width">
        <label for="description">Description</label>
        <textarea 
          id="description"
          name="description"
          [(ngModel)]="product.description"
          rows="4"></textarea>
      </div>

      <div class="form-group image-upload">
        <label>Product Image*</label>
        <div class="image-preview" [class.has-image]="product.image">
          <img *ngIf="product.image" [src]="product.image" [alt]="product.name">
          <div class="upload-placeholder" *ngIf="!product.image">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Click to upload image</p>
          </div>
          <input 
            type="file" 
            accept="image/*"
            (change)="onImageSelected($event)"
            #fileInput>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button 
        type="submit" 
        [disabled]="productForm.invalid || loading"
        class="save-button">
        <i class="fas fa-save"></i>
        {{ loading ? 'Saving...' : (isEditing ? 'Update Product' : 'Add Product') }}
      </button>
    </div>
  </form>
</div>
