<div class="manage-users">
    <div class="header">
        <h1>Manage Users</h1>
    </div>

    <div class="filters">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input 
                type="text" 
                [(ngModel)]="searchTerm" 
                placeholder="Search users..."
            >
        </div>

        <div class="role-filter">
            <label for="role">Role:</label>
            <select id="role" [(ngModel)]="selectedRole">
                <option *ngFor="let role of roles" [value]="role">
                    {{role | titlecase}}
                </option>
            </select>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Join Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of filteredUsers">
                    <td>#{{user.id}}</td>
                    <td>{{user.name}}</td>
                    <td>{{user.email}}</td>
                    <td>{{user.role | titlecase}}</td>
                    <td>
                        <span 
                            class="status-badge" 
                            [class]="user.status"
                            (click)="toggleUserStatus(user)"
                        >
                            {{user.status | titlecase}}
                        </span>
                    </td>
                    <td>{{user.joinDate | date}}</td>
                    <td class="actions">
                        <button class="delete-btn" (click)="deleteUser(user.id)" *ngIf="user.role !== 'admin'">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
                <tr *ngIf="filteredUsers.length === 0">
                    <td colspan="7" class="no-users">
                        No users found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
