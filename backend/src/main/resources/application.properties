spring.application.name=FinalProject

# =========================
# SERVER CONFIG
# =========================
server.port=${PORT:8080}
server.address=0.0.0.0
server.ssl.enabled=false

# =========================
# DATABASE CONFIG (local defaults; prod uses MYSQLHOST / MYSQL_URL via DatabaseUrlEnvironmentPostProcessor)
# =========================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.db.enabled=false
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# CORS CONFIG
# =========================
spring.mvc.cors.allowed-origins=http://localhost:4200,https://localhost:4200,http://shopping-platform.site,https://shopping-platform.site
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# =========================
# SECURITY HEADERS
# =========================
security.headers.frame-options=DENY
security.headers.content-type-options=nosniff

# =========================
# RAZORPAY CONFIG
# =========================
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.currency=INR
razorpay.company.name=Cara
razorpay.test.mode=true

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# OPENAI CONFIG (IMPORTANT FIX)
# =========================
openai.api.key=${OPENAI_API_KEY:}