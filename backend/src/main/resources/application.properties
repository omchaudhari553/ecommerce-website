spring.application.name=FinalProject

# =========================
# SERVER CONFIG
# =========================
server.port=${PORT:5000}
server.ssl.enabled=false

# =========================
# DATABASE CONFIG
# =========================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://root:shYOCMQbZFIGHXqKCHijfMJeSTsVAxvl@crossover.proxy.rlwy.net:21639/railway}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:shYOCMQbZFIGHXqKCHijfMJeSTsVAxvl}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =========================
# CORS CONFIG
# =========================
spring.mvc.cors.allowed-origins=http://localhost:4200,https://localhost:4200,http://shopping-platform.site,https://shopping-platform.site
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# =========================
# SECURITY HEADERS
# =========================
security.headers.frame-options=DENY
security.headers.content-type-options=nosniff

# =========================
# RAZORPAY CONFIG
# =========================
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR
razorpay.company.name=Cara
razorpay.test.mode=true

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

