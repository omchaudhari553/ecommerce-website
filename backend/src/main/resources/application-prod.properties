spring.application.name=FinalProject

# Server Configuration
server.port=${PORT:5000}

# MySQL Database Configuration - Railway
spring.datasource.url=${MYSQL_URL:jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# CORS Configuration
spring.mvc.cors.allowed-origins=https://your-vercel-app-url.vercel.app,https://your-vercel-app-url.vercel.app
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Security Headers for HTTPS
server.ssl.enabled=true
security.headers.frame-options=DENY
security.headers.content-type-options=nosniff

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR
razorpay.company.name=Cara
razorpay.test.mode=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
